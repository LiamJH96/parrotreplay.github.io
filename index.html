<style>
/* ═══════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --g:#00f082;--g2:#00d873;--gg:rgba(0,240,130,.3);
  --bg:#08080a;--bg2:#0e0e12;--card:#131318;
  --b1:#1c1c24;--b2:#2a2a34;
  --t1:#f4f4f6;--t2:#94949e;--t3:#58585f;
  --pro1:#c850c0;--pro2:#4158d0;--pro3:#43e8d8;
}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--t1);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
/* Film grain overlay */
body::after{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;
}
::selection{background:var(--g);color:var(--bg)}
.skip-link{position:absolute;top:-100px;left:16px;padding:12px 20px;background:var(--g);color:var(--bg);font-weight:700;border-radius:8px;z-index:9999;transition:top .2s}
.skip-link:focus{top:16px}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

.w{max-width:1240px;margin:0 auto;padding:0 28px}

/* Reveal animations */
[data-r]{opacity:0;transform:translateY(40px);transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .8s cubic-bezier(.22,1,.36,1);will-change:opacity,transform}
[data-r].v{opacity:1;transform:none;will-change:auto}

/* ═══════════════════════════════════════════
   COMING SOON
   ═══════════════════════════════════════════ */
.cs-wrap{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px 28px;
  position:relative;overflow:hidden;
  background:
    radial-gradient(ellipse at 30% 50%,rgba(0,240,130,.05) 0%,transparent 50%),
    radial-gradient(ellipse at 70% 20%,rgba(0,180,255,.03) 0%,transparent 40%),
    linear-gradient(180deg,var(--bg) 0%,#0c0c10 100%);
}
.cs-wrap::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:80px 80px;
  mask-image:radial-gradient(ellipse at 50% 50%,black 20%,transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse at 50% 50%,black 20%,transparent 70%);
  pointer-events:none;
}
.cs-orb{
  position:absolute;top:50%;left:50%;width:700px;height:700px;
  background:radial-gradient(circle,rgba(0,240,130,.07),transparent 65%);
  transform:translate(-50%,-50%);filter:blur(60px);pointer-events:none;
  animation:orb 10s ease-in-out infinite;
}
@keyframes orb{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.12);opacity:.7}}
.cs-inner{position:relative;z-index:1;max-width:600px}
.cs-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:48px}
.cs-logo img{width:36px;height:36px;filter:drop-shadow(0 0 12px var(--gg))}
.cs-logo-name{font-family:'DM Sans',sans-serif;font-weight:800;font-size:2rem;color:var(--g)}
.cs-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--g);margin-bottom:24px;
}
.cs-eyebrow::before{content:'';width:32px;height:2px;background:var(--g);border-radius:2px}
.cs-eyebrow::after{content:'';width:32px;height:2px;background:var(--g);border-radius:2px}
.cs-h1{
  font-family:'DM Sans',sans-serif;font-weight:800;
  font-size:clamp(3rem,8vw,5.5rem);letter-spacing:-.04em;line-height:1;
  margin-bottom:24px;
}
.cs-p{color:var(--t2);font-size:1.1rem;line-height:1.75;margin-bottom:40px}
.cs-discord{
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 28px;background:#5865f2;color:#fff;
  font-weight:700;font-size:.9375rem;border-radius:12px;
  transition:all .3s cubic-bezier(.22,1,.36,1);
  text-decoration:none;
}
.cs-discord:hover{background:#4752c4;transform:translateY(-3px);box-shadow:0 12px 40px rgba(88,101,242,.4)}
.cs-foot{
  position:absolute;bottom:28px;left:0;right:0;
  text-align:center;font-size:.8rem;color:var(--t3);
}
.brand{display:flex;align-items:center;gap:8px;font-family:'DM Sans',sans-serif;font-weight:800;font-size:1rem;color:var(--g);white-space:nowrap}
.brand img{width:26px;height:26px;filter:drop-shadow(0 0 8px var(--gg))}
</style>
<noscript><style>[data-r]{opacity:1!important;transform:none!important}</style></noscript>
